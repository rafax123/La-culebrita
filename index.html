<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Culebrita Aesthetic</title>
    <!-- Conexión al manifiesto para la Store -->
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Quicksand', sans-serif;
            color: #555;
        }

        .screen {
            background: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            backdrop-filter: blur(10px);
            display: none;
        }

        .active { display: block; }

        /* Título con letra cursiva suave (Pacifico) */
        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 50px;
            color: #ff9a9e;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* Texto suave adicional */
        .subtitle {
            font-size: 18px;
            color: #a18cd1;
            margin-bottom: 30px;
        }

        button {
            display: block;
            width: 200px;
            margin: 10px auto;
            padding: 12px;
            border: none;
            border-radius: 20px;
            background: #ffecd2;
            color: #888;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #ff9a9e; color: white; }

        canvas {
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div id="menuScreen" class="screen active">
        <h1>La Culebrita</h1>
        <p class="subtitle">¡Deslízate hacia la victoria! ✨</p>
        <button onclick="iniciarJuego()">Jugar Ahora</button>
        <button onclick="mostrarOpciones()">Ajustes</button>
    </div>

    <!-- PANTALLA DE JUEGO (Simplificada) -->
    <div id="gameScreen" class="screen">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <button onclick="mostrarMenu()">Volver</button>
    </div>

    <script>
        function iniciarJuego() {
            document.getElementById('menuScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
        }
        function mostrarMenu() {
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('menuScreen').classList.add('active');
        }
    </script>
</body>
</html>
